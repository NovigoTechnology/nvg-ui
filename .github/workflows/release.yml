name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create GitHub Release & Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@novigotechnology'
          cache: 'yarn'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Build library
        run: yarn build

      - name: Publish to GitHub Packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          yarn publish --non-interactive --new-version "$VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NOVIGO_BOT_20250619 }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes in ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Installation

            Make sure you have configured GitHub Packages authentication (see [README.md](README.md#installation)):

            ```bash
            yarn add @novigotechnology/nvg-ui@${{ github.ref_name }}
            ```
          files: |
            dist/nvg-ui.es.js
            dist/nvg-ui.umd.js
            dist/nvg-ui.css
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.NOVIGO_BOT_20250619 }}
